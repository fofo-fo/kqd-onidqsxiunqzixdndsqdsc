name: Update Video URLs

on:
  workflow_dispatch:

permissions:
  contents: write   # ✅ THIS FIXES THE ERROR

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run script
        run: python scrap.py

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add articles.json
          git commit -m "Auto update videos" || echo "No changes"
          git push
